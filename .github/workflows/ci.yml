name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          # pnpm 11.7.0 requires Node >= 22.13; Node 20 crashed every run
          # at pnpm cache resolution (ERR_UNKNOWN_BUILTIN_MODULE node:sqlite)
          node-version: 22
          cache: "pnpm"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      # `pnpm lint` / `pnpm test` are declared in every app package, but the
      # toolchains (eslint/jest/vitest) are not devDependencies anywhere and
      # no eslint config exists — these steps have never passed on any
      # machine. Re-enable them when the toolchains land (see changelog.md
      # 2026-07-12 observation).
      # - run: pnpm lint
      # - run: pnpm test
      - run: cd backend && python -m pip install -e .[dev] && python -m pytest
